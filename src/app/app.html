<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Vocabulary</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
  <!-- insert nav panel -->
  <!-- <div th:replace="~{fragments/navbar :: navbar}"></div> -->

  <div class="content">
    <div class="vocab-header">
      <div class="vocab-header-main">
        <h1>Vocabulary</h1>
        <label class="vocab-search-label" for="search-word">Find a word</label>
        <input
          type="text"
          placeholder="Search by word or meaning..."
          id="search-word"
          class="vocab-search-input"
          autocomplete="off">
      </div>
      <button id="open-add-word-modal" type="button" class="btn-add-word">+ Add New Word</button>
    </div>
    <div id="vocabList" class="vocab-list" th:data-words-api-url="@{/api/words}"
      th:data-learned-icon-url="@{/img/learned.svg}" th:data-not-learned-icon-url="@{/img/not_learned.svg}"
      th:data-delete-icon-url="@{/img/delete.svg}">
      <div id="page-info"></div>
      <div id="words-container">
        <!-- render words -->
        <app-vocabulary-page />
      </div>
      
    </div>

  </div>
  <script th:src="@{/js/vocabulary/vocab-list.js}" defer></script>
</body>

</html>
