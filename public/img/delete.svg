<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">

  <defs>
    <!-- background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fecaca"></stop>
      <stop offset="60%" stop-color="#fb7185"></stop>
      <stop offset="100%" stop-color="#e11d48"></stop>
    </linearGradient>

    <!-- bin gradient -->
    <linearGradient id="bin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#991b1b"></stop>
      <stop offset="100%" stop-color="#7f1d1d"></stop>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="8" y="8" width="80" height="80" rx="18" fill="url(#bg)"></rect>

  <!-- lid -->
  <rect x="26" y="28" width="44" height="8" rx="4" fill="url(#bin)"></rect>

  <!-- handle -->
  <rect x="38" y="22" width="20" height="6" rx="3" fill="url(#bin)"></rect>

  <!-- bin body (slightly wider bottom = cartoon feel) -->
  <path d="M32 36 
           L64 36 
           L60 72 
           Q60 76 56 76
           L40 76
           Q36 76 36 72
           Z" fill="none" stroke="url(#bin)" stroke-width="6" stroke-linejoin="round"></path>

  <!-- inner lines -->
  <line x1="44" y1="44" x2="44" y2="66" stroke="url(#bin)" stroke-width="6" stroke-linecap="round"></line>

  <line x1="52" y1="44" x2="52" y2="66" stroke="url(#bin)" stroke-width="6" stroke-linecap="round"></line>

</svg>