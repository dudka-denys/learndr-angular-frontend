<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8ffe6"></stop>
      <stop offset="60%" stop-color="#9be3c7"></stop>
      <stop offset="100%" stop-color="#8cc8ff"></stop>
    </linearGradient>

    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1fa463"></stop>
      <stop offset="100%" stop-color="#0b6d43"></stop>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="8" y="8" width="80" height="80" rx="18" fill="url(#bgGrad)"></rect>

  <!-- check mark -->
  <path d="M30 50 L42 62 L68 36" fill="none" stroke="url(#checkGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>